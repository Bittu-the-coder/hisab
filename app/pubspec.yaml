name: app
description: "Hisab - Personal Expense Tracker"
publish_to: 'none'
version: 1.1.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.4
  go_router: ^14.8.1
  intl: ^0.20.2
  fl_chart: ^0.70.2
  google_fonts: ^6.2.1
  equatable: ^2.0.7
  table_calendar: ^3.2.0
  shared_preferences: ^2.5.2
  sqflite: ^2.4.1
  path_provider: ^2.1.5
  path: ^1.9.1
  connectivity_plus: ^6.1.2
  flutter_launcher_icons: ^0.14.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.3

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#F8F7F4"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"
